version: "3.8"

services:
  # Backend API Service - Production
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: contacts-backend:latest
    container_name: contacts-backend-prod
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      MONGO_URL: ${MONGO_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      mongo:
        condition: service_healthy
    restart: always
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB Database Service - Production
  mongo:
    image: mongo:6.0
    container_name: contacts-mongo-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-contacts_app}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: always
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo-data:
    driver: local

networks:
  backend:
    driver: bridge
